<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/morse.play/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="morse_web_play">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>morse.play</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* To prevent the white bg on resize */
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background-color: #000000;
      /* Default for dark mode */
    }

    /* Use system theme to match background before Flutter loads */
    @media (prefers-color-scheme: light) {

      html,
      body {
        background-color: #E9ECED;
      }
    }

    /* Ensure the canvas fills everything instantly */
    #flutter_container {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>

  <!-- Meta theme color for mobile browsers -->
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#E9ECED">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#000000">
</head>

<body>
  <div id="flutter_container"></div>
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
